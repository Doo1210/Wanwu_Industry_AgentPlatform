<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事件任务</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/lucide.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.5.6/dist/index.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus@2.5.6"></script>
    <style>
        body { font-family: "Inter", system-ui, sans-serif; background-color: #f1f5f9; margin: 0; }
        [v-cloak] { display: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .drawer-mask { background-color: rgba(15,23,42,0.4); backdrop-filter: blur(2px); }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="app" v-cloak>
        <header class="bg-white border-b border-gray-200 h-14 flex items-center justify-between px-6 shrink-0 shadow-sm z-50">
                <div class="flex items-center gap-2 text-base font-black tracking-tight text-gray-800">事件任务</div>
                <button @click="openCreateDialog" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded text-sm font-bold flex items-center gap-1.5 transition-all shadow-sm">
                    <i data-lucide="plus" class="w-4 h-4"></i> 新建任务
                </button>
            </header>
            <main class="flex-1 overflow-hidden flex flex-col p-6 gap-4 max-w-[1600px] mx-auto w-full">
                <div class="flex items-center gap-3 shrink-0 bg-white p-3 rounded border border-gray-200 shadow-sm">
                    <div class="relative flex-1 max-w-sm">
                        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-2.5 text-gray-400"></i>
                        <input v-model="searchKeyword" type="text" placeholder="搜索任务名称" class="w-full pl-9 pr-8 py-1.5 bg-gray-50 border border-gray-200 rounded text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:bg-white transition-all">
                        <span v-if="searchKeyword" @mousedown.prevent="searchKeyword = ''" class="absolute right-2.5 top-1/2 -translate-y-1/2 w-4 h-4 flex items-center justify-center rounded-full bg-gray-300 text-white hover:bg-gray-400 cursor-pointer z-10 transition-colors">
                            <i data-lucide="x" class="w-3 h-3"></i>
                        </span>
                    </div>
                    <div class="relative w-40">
                        <select v-model="filterStatus" class="w-full appearance-none bg-gray-50 border border-gray-200 rounded px-3 py-1.5 pr-8 text-sm text-gray-400 outline-none cursor-pointer focus:bg-white focus:border-blue-500 transition-all" :class="{'text-gray-800': filterStatus}">
                            <option value="" disabled>启停状态</option>
                            <option value="running">运行中</option>
                            <option value="stopped">已停用</option>
                            <option value="draft">草稿</option>
                        </select>
                        <span v-if="filterStatus" @mousedown.prevent="clearFilter('status')" class="absolute right-7 top-1/2 -translate-y-1/2 w-4 h-4 flex items-center justify-center rounded-full bg-gray-300 text-white hover:bg-gray-400 cursor-pointer z-10 transition-colors">
                            <i data-lucide="x" class="w-3 h-3"></i>
                        </span>
                        <i data-lucide="chevron-down" class="w-4 h-4 absolute right-2.5 top-2.5 text-gray-400 pointer-events-none"></i>
                    </div>
                    <div class="relative w-40">
                        <select v-model="filterSourceType" class="w-full appearance-none bg-gray-50 border border-gray-200 rounded px-3 py-1.5 pr-8 text-sm text-gray-400 outline-none cursor-pointer focus:bg-white focus:border-blue-500 transition-all" :class="{'text-gray-800': filterSourceType}">
                            <option value="" disabled>触发源类型</option>
                            <option value="Pulsar">Pulsar</option>
                            <option value="Timer">Timer</option>
                            <option value="Kafka">Kafka</option>
                            <option value="WebHook">WebHook</option>
                        </select>
                        <span v-if="filterSourceType" @mousedown.prevent="clearFilter('sourceType')" class="absolute right-7 top-1/2 -translate-y-1/2 w-4 h-4 flex items-center justify-center rounded-full bg-gray-300 text-white hover:bg-gray-400 cursor-pointer z-10 transition-colors">
                            <i data-lucide="x" class="w-3 h-3"></i>
                        </span>
                        <i data-lucide="chevron-down" class="w-4 h-4 absolute right-2.5 top-2.5 text-gray-400 pointer-events-none"></i>
                    </div>
                </div>
                <div class="flex-1 bg-white rounded border border-gray-200 shadow-sm overflow-hidden flex flex-col relative z-10">
                    <div class="flex-1 overflow-y-auto">
                        <table class="w-full text-left text-sm border-collapse">
                            <thead class="bg-gray-50/80 text-gray-500 text-[13px] font-bold sticky top-0 z-10 border-b border-gray-200 shadow-sm">
                                <tr>
                                    <th class="px-6 py-3.5 w-[14%]">任务名称</th>
                                    <th class="px-6 py-3.5 w-[12%] text-left">触发事件</th>
                                    <th class="px-6 py-3.5 w-[7%]">当前版本</th>
                                    <th class="px-6 py-3.5 w-[12%]">策略概要</th>
                                    <th class="px-6 py-3.5 w-[8%] text-center">启停状态</th>
                                    <th class="px-6 py-3.5 w-[10%]">执行次数</th>
                                    <th class="px-6 py-3.5 w-[27%] text-left">操作</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                <tr v-for="task in filteredTaskList" :key="task.id" class="hover:bg-blue-50/30 transition-colors group">
                                    <td class="px-6 py-4 font-bold text-gray-800 text-[14px]">
                                        <button @click="openDetail(task)" class="hover:text-blue-600 transition-colors">{{ task.name }}</button>
                                    </td>
                                    <td class="px-6 py-4">
                                        <span v-if="task.sourceType === 'Timer'" class="text-gray-600 font-bold inline-flex items-center gap-1.5"><i data-lucide="clock" class="w-4 h-4 text-gray-400"></i> {{ task.sourceName }}</span>
                                        <span v-else-if="task.sourceType === 'WebHook'" class="text-green-600 font-bold inline-flex items-center gap-1.5"><i data-lucide="link" class="w-4 h-4 text-green-400"></i> {{ task.sourceName }}</span>
                                        <span v-else-if="task.sourceType === 'Kafka'" class="text-purple-600 font-bold inline-flex items-center gap-1.5"><i data-lucide="activity" class="w-4 h-4 text-purple-400"></i> {{ task.sourceName }}</span>
                                        <span v-else class="text-blue-600 font-bold inline-flex items-center gap-1.5"><i data-lucide="zap" class="w-4 h-4 text-blue-400"></i> {{ task.sourceName }}</span>
                                    </td>
                                    <td class="px-6 py-4 font-mono text-[13px] text-gray-600">v{{ task.version }}</td>
                                    <td class="px-6 py-4">
                                        <span class="text-[13px] text-gray-600 font-bold">
                                            <template v-if="task.ruleCount > 0 || task.agentCount > 0">
                                                <span v-if="task.ruleCount > 0">{{ task.ruleCount }}规则</span>
                                                <span v-if="task.ruleCount > 0 && task.agentCount > 0">；</span>
                                                <span v-if="task.agentCount > 0">{{ task.agentCount }}智能体</span>
                                            </template>
                                            <span v-else class="text-gray-400">-</span>
                                        </span>
                                    </td>
                                    <td class="px-6 py-4 text-center">
                                        <div @click="toggleTaskStatus(task)" :class="task.status === 'running' ? 'bg-green-500' : 'bg-gray-300'" class="relative inline-flex h-4 w-8 cursor-pointer items-center rounded-full transition-colors shadow-inner">
                                            <span :class="task.status === 'running' ? 'translate-x-4' : 'translate-x-1'" class="inline-block h-2.5 w-2.5 transform rounded-full bg-white transition-transform"></span>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4 font-mono text-[13px] text-gray-600">{{ task.totalTriggerCount }} 次</td>
                                    <td class="px-6 py-4 text-left">
                                        <div class="flex items-center justify-start gap-3 text-[13px] font-bold whitespace-nowrap">
                                            <button @click="openDetail(task)" class="text-blue-600 hover:text-blue-800 transition-colors">配置</button>
                                            <button @click="openDetail(task, 'logs')" class="text-blue-600 hover:text-blue-800 transition-colors">运行日志</button>
                                            <button @click="openDetail(task, 'stats')" class="text-blue-600 hover:text-blue-800 transition-colors">统计</button>
                                            <div class="relative" @click.stop>
                                                <button @click="task.showMore = !task.showMore" class="text-blue-600 hover:text-blue-800 transition-colors flex items-center gap-1">
                                                    更多
                                                    <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>
                                                </button>
                                                <div v-if="task.showMore" class="absolute right-0 top-full mt-1 bg-white border border-gray-200 rounded-lg shadow-lg py-1 z-50 min-w-[120px]">
                                                    <button @click="openDetail(task); task.showMore = false" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors block">编辑</button>
                                                    <button @click="openDeleteModal(task); task.showMore = false" class="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-red-50 transition-colors block">删除</button>
                                                </div>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="px-6 py-3 border-t border-gray-200 flex items-center justify-between bg-white shrink-0">
                        <span class="text-sm text-gray-500">共 {{ filteredTaskList.length }} 个任务</span>
                        <div class="flex items-center gap-1">
                            <button class="w-7 h-7 rounded flex items-center justify-center border border-gray-200 bg-white text-gray-500 hover:bg-gray-50"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                            <button class="w-7 h-7 rounded flex items-center justify-center bg-blue-600 text-white text-sm font-bold shadow-sm shadow-blue-200">1</button>
                            <button class="w-7 h-7 rounded flex items-center justify-center border border-gray-200 bg-white text-gray-500 hover:bg-gray-50"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>
            </main>

        <div v-if="isCreateDialogOpen" class="fixed inset-0 z-50 flex items-center justify-center">
            <div class="drawer-mask absolute inset-0 transition-opacity" @click="isCreateDialogOpen = false"></div>
            <div class="relative w-[480px] max-h-[80vh] bg-white shadow-2xl flex flex-col rounded-xl overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-white shrink-0">
                    <div class="text-base font-black text-gray-800">新建任务</div>
                    <button @click="isCreateDialogOpen = false" class="w-8 h-8 flex items-center justify-center rounded-full text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-all">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>
                <div class="overflow-y-auto p-6 space-y-6">
                    <div>
                        <label class="block text-sm text-gray-700 mb-2 font-bold">任务名称</label>
                        <input type="text" v-model="createForm.name" placeholder="输入任务名称" class="w-full bg-gray-50 border border-gray-200 rounded-md px-3 py-2 text-sm outline-none focus:bg-white focus:border-blue-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-700 mb-2 font-bold">任务描述</label>
                        <textarea v-model="createForm.description" placeholder="输入任务描述" rows="4" class="w-full bg-gray-50 border border-gray-200 rounded-md px-3 py-2 text-sm outline-none focus:bg-white focus:border-blue-500 transition-all resize-none"></textarea>
                    </div>
                    <div class="pt-4 border-t border-gray-200">
                        <button class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-md text-sm font-bold transition-all">创建任务</button>
                    </div>
                </div>
            </div>
        </div>

        

        

        

        

        

        
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        const app = createApp({
            setup() {
                const searchKeyword = ref('');
                const filterStatus = ref('');
                const filterSourceType = ref('');

                const isCreateDialogOpen = ref(false);

                const createForm = ref({ name: '', description: '' });
                
                
                

                
                
                
                
                
                
                
                
                
                

                const taskList = ref([
                    { id: 1, name: '订单同步任务', sourceType: 'Pulsar', sourceName: '订单创建事件', version: 2, status: 'running', todayTriggerCount: 1234, successRate: 98.5, totalTriggerCount: 15678, successCount: 15444, blockCount: 156, failCount: 78, ruleCount: 3, agentCount: 2, agent: '订单处理智能体', sourceConfig: { ip: '192.168.1.100', topic: 'order-events' }, rules: [{ name: '金额大于1000通知' }], errors: [{ id: 1, type: '网络超时', message: '连接超时，无法访问下游服务', count: 12, lastTime: '2024-01-15 14:32' }] },
                    { id: 2, name: '库存检查任务', sourceType: 'Timer', sourceName: '定时检查库存', version: 1, status: 'running', todayTriggerCount: 48, successRate: 100, totalTriggerCount: 1234, successCount: 1234, blockCount: 0, failCount: 0, ruleCount: 1, agentCount: 0, agent: null, sourceConfig: { cronDesc: '每30分钟执行一次' }, rules: [{ name: '库存预警' }], errors: [] },
                    { id: 3, name: '支付回调处理', sourceType: 'WebHook', sourceName: '支付宝回调', version: 3, status: 'stopped', todayTriggerCount: 0, successRate: 0, totalTriggerCount: 890, successCount: 876, blockCount: 8, failCount: 6, ruleCount: 2, agentCount: 1, agent: '支付处理智能体', sourceConfig: { path: '/webhook/alipay' }, rules: [{ name: '验签验证' }], errors: [] }
                ]);

                

                

                

                

                const filteredTaskList = computed(() => {
                    return taskList.value.filter(task => {
                        const matchKeyword = !searchKeyword.value || task.name.toLowerCase().includes(searchKeyword.value.toLowerCase());
                        const matchStatus = !filterStatus.value || task.status === filterStatus.value;
                        const matchSource = !filterSourceType.value || task.sourceType === filterSourceType.value;
                        return matchKeyword && matchStatus && matchSource;
                    });
                });

                

                

                

                

                

                const clearFilter = (type) => {
                    if (type === 'status') filterStatus.value = '';
                    if (type === 'sourceType') filterSourceType.value = '';
                };

                const toggleTaskStatus = (task) => {
                    task.status = task.status === 'running' ? 'stopped' : 'running';
                };

                const openCreateDialog = () => {
                    isCreateDialogOpen.value = true;
                };

                const openDetail = (task, tab = 'config') => {
                    window.location.href = `事件任务详情.html?id=${task.id}&tab=${tab}`;
                };

                

                

                

                

                const openDeleteModal = (task) => {
                    ElementPlus.ElMessageBox.confirm(
                        `您确定要删除任务「${task.name}」吗？`,
                        '确认删除',
                        { confirmButtonText: '确认删除', cancelButtonText: '取消', type: 'warning' }
                    ).then(() => {
                        const idx = taskList.value.findIndex(t => t.id === task.id);
                        if (idx > -1) taskList.value.splice(idx, 1);
                        ElementPlus.ElMessage.success('删除成功');
                    }).catch(() => {});
                };

                

                

                

                

                

                

                

                

                

                

                

                

                

                

                

                

                

                

                

                onMounted(() => {
                    if (window.lucide) lucide.createIcons();
                });

                

                return {
                    searchKeyword, filterStatus, filterSourceType,
                    isCreateDialogOpen,
                    createForm,
                    taskList,
                    filteredTaskList,
                    clearFilter, toggleTaskStatus, openCreateDialog, openDetail, openDeleteModal
                };
            }
        });

        for (const [key, component] of Object.entries(ElementPlusIconsVue)) { app.component(key, component); }

        app.component('Lightning', {
            template: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" style="width:1em;height:1em;"><path d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z"/></svg>'
        });
        app.component('Timer', {
            template: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" style="width:1em;height:1em;"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-14a1 1 0 10-2 0v5.586l2.293 2.293a1 1 0 001.414-1.414L11 9.586V4z" clip-rule="evenodd"/></svg>'
        });

        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>

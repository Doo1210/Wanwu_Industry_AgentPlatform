<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事件任务</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/lucide.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.5.6/dist/index.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus@2.5.6"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus@2.5.6/dist/locale/zh-cn.min.js"></script>
    <style>
        body { font-family: "Inter", system-ui, sans-serif; background-color: #f1f5f9; margin: 0; }
        [v-cloak] { display: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .drawer-mask { background-color: rgba(15,23,42,0.4); backdrop-filter: blur(2px); }

        /* ================= 任务列表样式（极简留白卡片风） ================= */
        .log-view-container {
            background: #f7f8fa;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            padding: 8px 24px;
            box-sizing: border-box;
            gap: 6px;
        }
        .log-view-card {
            background: #fff;
            border: 1px solid #ebeef5;
            border-radius: 10px;
            padding: 12px 22px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.02);
            transition: box-shadow 0.2s;
        }
        .log-view-card:hover {
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
        }
        .log-view-card-main {
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        .log-view-filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .log-filter-label {
            font-size: 13px;
            color: #5a6b85;
            font-weight: 500;
            letter-spacing: 0.2px;
            margin-right: 4px;
        }
        .log-view-table {
            --el-table-border-color: #ebeef5;
            --el-table-header-bg-color: #f8fafc;
            --el-table-header-text-color: #475569;
            --el-table-row-hover-bg-color: #f1f7ff;
            font-size: 13px;
        }
        .log-view-table th.el-table__cell {
            font-weight: 600;
            padding: 12px 0;
            font-size: 12px;
            letter-spacing: 0.4px;
            color: #475569;
            text-transform: uppercase;
        }
        .log-view-table td.el-table__cell {
            padding: 12px 0;
        }
        .log-view-table .el-table__row:hover td:first-child {
            box-shadow: inset 3px 0 0 #3b82f6;
        }
        .log-view-action-links .el-button {
            font-weight: 500;
            padding: 0 4px;
        }
        .log-view-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 16px;
            margin-top: 14px;
            border-top: 1px solid #f1f5f9;
            flex-shrink: 0;
        }
        .log-view-footer .log-total {
            font-size: 13px;
            color: #94a3b8;
            font-weight: 500;
        }
        .log-view-footer .log-total .log-total-num {
            color: #0f172a;
            font-weight: 600;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
        }
        .log-version {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            background: #eef2f7;
            border-radius: 4px;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 11.5px;
            color: #64748b;
            font-weight: 600;
        }
        .log-duration {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 12.5px;
            font-weight: 500;
            color: #475569;
        }
        .log-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: #94a3b8;
            gap: 10px;
        }
        .log-empty .empty-icon {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            color: #cbd5e1;
            margin-bottom: 6px;
        }
        .log-empty .empty-title {
            font-size: 14px;
            font-weight: 600;
            color: #64748b;
        }
        .log-empty .empty-desc {
            font-size: 12px;
            color: #94a3b8;
        }
        /* 任务名称链接 */
        .task-name-link {
            color: #1e293b;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: color 0.15s;
        }
        .task-name-link:hover { color: #3b82f6; }
        /* 触发事件 */
        .task-source {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #475569;
        }
        .task-source-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .task-source-dot.timer { background: #64748b; }
        .task-source-dot.webhook { background: #10b981; }
        .task-source-dot.kafka { background: #8b5cf6; }
        .task-source-dot.pulsar { background: #3b82f6; }
        /* 更多下拉菜单 */
        .task-more-dropdown {
            border-radius: 8px !important;
            box-shadow: 0 4px 16px rgba(15,23,42,0.08) !important;
            border: 1px solid #ebeef5 !important;
            padding: 4px 0 !important;
        }
        .task-more-dropdown .el-dropdown-menu__item {
            font-size: 13px;
            padding: 8px 16px;
        }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="app" v-cloak class="h-full flex flex-col overflow-hidden">
        <header class="bg-white border-b border-gray-200 h-[60px] flex items-center justify-between px-6 shrink-0 shadow-sm z-50">
                <div class="flex items-center gap-2 text-base font-black tracking-tight text-gray-800">事件任务</div>
                <button @click="openCreateDialog" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded text-sm font-bold flex items-center gap-1.5 transition-all shadow-sm">
                    <i data-lucide="plus" class="w-4 h-4"></i> 新建任务
                </button>
            </header>
            <main class="flex-1 overflow-hidden flex flex-col log-view-container max-w-[1600px] mx-auto w-full">
                <!-- 筛选卡片 -->
                <div class="log-view-card" style="padding: 10px 22px;">
                    <div class="log-view-filter-bar">
                        <span class="log-filter-label">搜索</span>
                        <el-input v-model="searchKeyword" placeholder="搜索任务名称" prefix-icon="Search" style="width: 220px;" size="small" clearable></el-input>
                        <span class="log-filter-label" style="margin-left: 8px;">启停状态</span>
                        <el-select v-model="filterStatus" placeholder="全部" style="width: 140px;" size="small" clearable>
                            <el-option label="运行中" value="running"></el-option>
                            <el-option label="已停用" value="stopped"></el-option>
                            <el-option label="草稿" value="draft"></el-option>
                        </el-select>
                    </div>
                </div>

                <!-- 表格卡片 -->
                <div class="log-view-card log-view-card-main">
                    <el-table
                        v-if="pagedTaskList.length > 0"
                        :data="pagedTaskList"
                        class="log-view-table"
                        style="width: 100%; flex: 1;"
                        :max-height="undefined">
                        <el-table-column prop="name" label="任务名称" min-width="200">
                            <template #default="scope">
                                <span class="task-name-link">{{ scope.row.name }}</span>
                            </template>
                        </el-table-column>
                        <el-table-column prop="version" label="任务版本" width="120">
                            <template #default="scope">
                                <span class="log-version">v{{ scope.row.version }}</span>
                            </template>
                        </el-table-column>
                        <el-table-column label="触发事件" min-width="180">
                            <template #default="scope">
                                <span class="task-source">
                                    <span :class="['task-source-dot', scope.row.sourceType.toLowerCase()]"></span>
                                    {{ scope.row.sourceName }}
                                </span>
                            </template>
                        </el-table-column>
                        <el-table-column label="配置概要" min-width="200">
                            <template #default="scope">
                                <span style="font-size:13px;color:#475569;font-weight:500;">
                                    <template v-if="scope.row.ruleCount > 0 || scope.row.agentCount > 0">
                                        <span v-if="scope.row.ruleCount > 0">{{ scope.row.ruleCount }}规则</span>
                                        <span v-if="scope.row.ruleCount > 0 && scope.row.agentCount > 0">；</span>
                                        <span v-if="scope.row.agentCount > 0">{{ scope.row.agentCount }}智能体</span>
                                    </template>
                                    <span v-else style="color:#94a3b8;">-</span>
                                </span>
                            </template>
                        </el-table-column>
                        <el-table-column label="启停状态" width="120">
                            <template #default="scope">
                                <el-switch
                                    :model-value="scope.row.status === 'running'"
                                    @click.stop
                                    @change="toggleTaskStatus(scope.row)"
                                    active-color="#13ce66"
                                    inactive-color="#c0ccda">
                                </el-switch>
                            </template>
                        </el-table-column>
                        <el-table-column prop="totalTriggerCount" label="执行次数" width="110">
                            <template #default="scope">
                                <span class="log-duration">{{ scope.row.totalTriggerCount }} 次</span>
                            </template>
                        </el-table-column>
                        <el-table-column label="操作" min-width="280" class-name="log-view-action-links">
                            <template #default="scope">
                                <div style="display:flex;align-items:center;gap:2px;white-space:nowrap;">
                                    <el-button type="primary" link @click.stop="openDetail(scope.row)">配置</el-button>
                                    <el-button type="primary" link @click.stop="openDetail(scope.row, 'logs')">运行日志</el-button>
                                    <el-button type="primary" link @click.stop="openDetail(scope.row, 'stats')">统计</el-button>
                                    <el-dropdown trigger="click" placement="bottom-end" popper-class="task-more-dropdown" @command="(cmd) => handleMoreCommand(cmd, scope.row)">
                                        <el-button type="primary" link style="color:#909399;">更多<el-icon class="el-icon--right"><ArrowDown /></el-icon></el-button>
                                        <template #dropdown>
                                            <el-dropdown-menu>
                                                <el-dropdown-item command="edit">编辑</el-dropdown-item>
                                                <el-dropdown-item command="delete" divided>删除</el-dropdown-item>
                                            </el-dropdown-menu>
                                        </template>
                                    </el-dropdown>
                                </div>
                            </template>
                        </el-table-column>
                    </el-table>

                    <!-- 空状态 -->
                    <div v-else class="log-empty">
                        <div class="empty-icon">
                            <el-icon><DocumentRemove /></el-icon>
                        </div>
                        <div class="empty-title">暂无匹配的任务</div>
                        <div class="empty-desc">尝试调整搜索关键词或筛选条件</div>
                    </div>

                    <!-- 分页栏 -->
                    <div v-if="filteredTaskList.length > 0" class="log-view-footer">
                        <span class="log-total">共 <span class="log-total-num">{{ filteredTaskList.length }}</span> 条记录</span>
                        <el-pagination
                            v-model:current-page="currentPage"
                            v-model:page-size="pageSize"
                            :page-sizes="[10, 20, 50]"
                            :total="filteredTaskList.length"
                            layout="sizes, prev, pager, next, jumper"
                            background
                            small>
                        </el-pagination>
                    </div>
                </div>
            </main>

        <div v-if="isCreateDialogOpen" class="fixed inset-0 z-50 flex items-center justify-center">
            <div class="drawer-mask absolute inset-0 transition-opacity" @click="isCreateDialogOpen = false"></div>
            <div class="relative w-[480px] max-h-[80vh] bg-white shadow-2xl flex flex-col rounded-xl overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-white shrink-0">
                    <div class="text-base font-black text-gray-800">新建任务</div>
                    <button @click="isCreateDialogOpen = false" class="w-8 h-8 flex items-center justify-center rounded-full text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-all">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>
                <div class="overflow-y-auto p-6 space-y-6">
                    <div>
                        <label class="block text-sm text-gray-700 mb-2 font-bold">任务名称 <span class="text-red-500">*</span></label>
                        <input type="text" v-model="createForm.name" placeholder="输入任务名称" class="w-full bg-gray-50 border border-gray-200 rounded-md px-3 py-2 text-sm outline-none focus:bg-white focus:border-blue-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-700 mb-2 font-bold">任务描述 <span class="text-red-500">*</span></label>
                        <textarea v-model="createForm.description" placeholder="输入任务描述" rows="4" class="w-full bg-gray-50 border border-gray-200 rounded-md px-3 py-2 text-sm outline-none focus:bg-white focus:border-blue-500 transition-all resize-none"></textarea>
                    </div>
                    <div class="pt-4 border-t border-gray-200 flex items-center justify-end gap-3">
                        <button @click="isCreateDialogOpen = false" class="px-6 bg-white hover:bg-gray-50 text-gray-700 py-2 rounded-md text-sm font-bold border border-gray-200 transition-all">取消</button>
                        <button @click="handleCreateTask" class="px-6 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-md text-sm font-bold transition-all">确认</button>
                    </div>
                </div>
            </div>
        </div>

        <div v-if="isEditDialogOpen" class="fixed inset-0 z-50 flex items-center justify-center">
            <div class="drawer-mask absolute inset-0 transition-opacity" @click="isEditDialogOpen = false"></div>
            <div class="relative w-[480px] max-h-[80vh] bg-white shadow-2xl flex flex-col rounded-xl overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-white shrink-0">
                    <div class="text-base font-black text-gray-800">编辑任务</div>
                    <button @click="isEditDialogOpen = false" class="w-8 h-8 flex items-center justify-center rounded-full text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-all">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>
                <div class="overflow-y-auto p-6 space-y-6">
                    <div>
                        <label class="block text-sm text-gray-700 mb-2 font-bold">任务名称 <span class="text-red-500">*</span></label>
                        <input type="text" v-model="editForm.name" placeholder="输入任务名称" class="w-full bg-gray-50 border border-gray-200 rounded-md px-3 py-2 text-sm outline-none focus:bg-white focus:border-blue-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-700 mb-2 font-bold">任务描述 <span class="text-red-500">*</span></label>
                        <textarea v-model="editForm.description" placeholder="输入任务描述" rows="4" class="w-full bg-gray-50 border border-gray-200 rounded-md px-3 py-2 text-sm outline-none focus:bg-white focus:border-blue-500 transition-all resize-none"></textarea>
                    </div>
                    <div class="pt-4 border-t border-gray-200 flex items-center justify-end gap-3">
                        <button @click="isEditDialogOpen = false" class="px-6 bg-white hover:bg-gray-50 text-gray-700 py-2 rounded-md text-sm font-bold border border-gray-200 transition-all">取消</button>
                        <button @click="handleSaveEdit" class="px-6 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-md text-sm font-bold transition-all">确认</button>
                    </div>
                </div>
            </div>
        </div>

        

        

        

        

        

        
    </div>

    <script>
        const { createApp, ref, computed, onMounted, nextTick, watch } = Vue;

        const app = createApp({
            setup() {
                const searchKeyword = ref('');
                const filterStatus = ref('');

                const isCreateDialogOpen = ref(false);
                const isEditDialogOpen = ref(false);
                const editingTask = ref(null);

                const createForm = ref({ name: '', description: '' });
                const editForm = ref({ name: '', description: '' });
                
                
                

                
                
                
                
                
                
                
                
                
                

                const taskList = ref([
                    { id: 1, name: '订单同步任务', description: '同步外部平台的订单数据到内部系统', sourceType: 'Pulsar', sourceName: '订单创建事件', version: 2, status: 'running', todayTriggerCount: 1234, successRate: 98.5, totalTriggerCount: 15678, successCount: 15444, blockCount: 156, failCount: 78, ruleCount: 3, agentCount: 2, agent: '订单处理智能体', sourceConfig: { ip: '192.168.1.100', topic: 'order-events' }, rules: [{ name: '金额大于1000通知' }], errors: [{ id: 1, type: '网络超时', message: '连接超时，无法访问下游服务', count: 12, lastTime: '2024-01-15 14:32' }] },
                    { id: 2, name: '库存检查任务', description: '定时检查库存状态并及时预警', sourceType: 'Timer', sourceName: '定时检查库存', version: 1, status: 'running', todayTriggerCount: 48, successRate: 100, totalTriggerCount: 1234, successCount: 1234, blockCount: 0, failCount: 0, ruleCount: 1, agentCount: 0, agent: null, sourceConfig: { cronDesc: '每30分钟执行一次' }, rules: [{ name: '库存预警' }], errors: [] },
                    { id: 3, name: '支付回调处理', description: '处理支付宝支付回调通知并进行验签', sourceType: 'WebHook', sourceName: '支付宝回调', version: 3, status: 'stopped', todayTriggerCount: 0, successRate: 0, totalTriggerCount: 890, successCount: 876, blockCount: 8, failCount: 6, ruleCount: 2, agentCount: 1, agent: '支付处理智能体', sourceConfig: { path: '/webhook/alipay' }, rules: [{ name: '验签验证' }], errors: [] }
                ]);

                

                

                

                

                const filteredTaskList = computed(() => {
                    return taskList.value.filter(task => {
                        const matchKeyword = !searchKeyword.value || task.name.toLowerCase().includes(searchKeyword.value.toLowerCase());
                        const matchStatus = !filterStatus.value || task.status === filterStatus.value;
                        return matchKeyword && matchStatus;
                    });
                });

                const currentPage = ref(1);
                const pageSize = ref(10);

                const pagedTaskList = computed(() => {
                    const start = (currentPage.value - 1) * pageSize.value;
                    return filteredTaskList.value.slice(start, start + pageSize.value);
                });

                watch([searchKeyword, filterStatus], () => { currentPage.value = 1; });

                

                

                

                

                

                const clearFilter = (type) => {
                    if (type === 'status') filterStatus.value = '';
                };

                const handleMoreCommand = (cmd, task) => {
                    if (cmd === 'edit') {
                        openEditDialog(task);
                    } else if (cmd === 'delete') {
                        openDeleteModal(task);
                    }
                };

                const toggleTaskStatus = (task) => {
                    task.status = task.status === 'running' ? 'stopped' : 'running';
                };

                const openCreateDialog = () => {
                    isCreateDialogOpen.value = true;
                };

                const openEditDialog = (task) => {
                    editingTask.value = task;
                    editForm.value = { name: task.name, description: task.description || '' };
                    isEditDialogOpen.value = true;
                    task.showMore = false;
                };

                const handleSaveEdit = () => {
                    if (!editForm.value.name.trim() || !editForm.value.description.trim()) {
                        ElementPlus.ElMessage.warning('请填写任务名称和任务描述');
                        return;
                    }
                    editingTask.value.name = editForm.value.name;
                    editingTask.value.description = editForm.value.description;
                    isEditDialogOpen.value = false;
                    editingTask.value = null;
                    ElementPlus.ElMessage.success('任务编辑成功');
                };

                const handleCreateTask = () => {
                    if (!createForm.value.name.trim() || !createForm.value.description.trim()) {
                        ElementPlus.ElMessage.warning('请填写任务名称和任务描述');
                        return;
                    }
                    const newId = Math.max(...taskList.value.map(t => t.id), 0) + 1;
                    taskList.value.push({
                        id: newId,
                        name: createForm.value.name,
                        description: createForm.value.description,
                        sourceType: 'Pulsar',
                        sourceName: '未配置',
                        version: 1,
                        status: 'draft',
                        todayTriggerCount: 0,
                        successRate: 0,
                        totalTriggerCount: 0,
                        successCount: 0,
                        blockCount: 0,
                        failCount: 0,
                        ruleCount: 0,
                        agentCount: 0,
                        agent: null,
                        sourceConfig: {},
                        rules: [],
                        errors: []
                    });
                    createForm.value = { name: '', description: '' };
                    isCreateDialogOpen.value = false;
                    ElementPlus.ElMessage.success('任务创建成功');
                };

                const openDetail = (task, tab = 'config') => {
                    window.location.href = `事件任务详情.html?id=${task.id}&tab=${tab}`;
                };

                

                

                

                

                const openDeleteModal = (task) => {
                    ElementPlus.ElMessageBox.confirm(
                        `您确定要删除任务「${task.name}」吗？`,
                        '确认删除',
                        { confirmButtonText: '确认删除', cancelButtonText: '取消', type: 'warning' }
                    ).then(() => {
                        const idx = taskList.value.findIndex(t => t.id === task.id);
                        if (idx > -1) taskList.value.splice(idx, 1);
                        ElementPlus.ElMessage.success('删除成功');
                    }).catch(() => {});
                };

                

                

                

                

                

                

                

                

                

                

                

                

                

                

                

                

                

                

                

                onMounted(() => {
                    Vue.nextTick(() => { if (window.lucide) lucide.createIcons(); });
                });

                watch(isCreateDialogOpen, (val) => {
                    if (val) nextTick(() => { if (window.lucide) lucide.createIcons(); });
                });
                watch(isEditDialogOpen, (val) => {
                    if (val) nextTick(() => { if (window.lucide) lucide.createIcons(); });
                });

                

                return {
                    searchKeyword, filterStatus, currentPage, pageSize,
                    isCreateDialogOpen, isEditDialogOpen, editingTask,
                    createForm, editForm,
                    taskList,
                    filteredTaskList, pagedTaskList,
                    clearFilter, handleMoreCommand, toggleTaskStatus, openCreateDialog, openEditDialog, handleSaveEdit, handleCreateTask, openDetail, openDeleteModal
                };
            }
        });

        for (const [key, component] of Object.entries(ElementPlusIconsVue)) { app.component(key, component); }

        app.component('Lightning', {
